<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的專案 — Storyboard AI</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>

<body>
    <main id="page-main" class="dash-main projects-main">
        <section class="projects-management anim-fadeInUp">
            <div class="projects-header">
                <h1 class="projects-title">我的專案</h1>
                <a class="btn new-project-btn" onclick="spaNavigate('generate')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    新增專案
                </a>
            </div>
            
            <div class="projects-grid" id="projects-grid">
                <!-- Projects will be dynamically rendered here -->
                <div class="projects-empty">
                    <h3>載入中...</h3>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/generate-prefill-path.js"></script>
    <script src="../js/sys.js"></script>
</body>

</html>
