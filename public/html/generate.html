<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生成分鏡 — Storyboard AI</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/generate.css" />
    <link rel="stylesheet" href="../css/math-curve-loader.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=DM+Mono:wght@400&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Dynamic BG -->
    <div id="BG">
        <div class="bgDots" id="bgDot1"
            style="width:700px;height:700px;left:-150px;top:-150px;filter:blur(140px);opacity:0.4;"></div>
        <div class="bgDots" id="bgDot2"
            style="width:600px;height:600px;right:-100px;top:0;filter:blur(130px);opacity:0.3;"></div>
        <div class="bgDots" id="bgDot4"
            style="width:500px;height:500px;left:25%;bottom:-80px;filter:blur(120px);opacity:0.25;"></div>
        <div id="bgMask"></div>
        
    </div>

    <!-- ══════════════════════════════════
       PHASE 1 — COMPOSE
    ══════════════════════════════════ -->
    <div class="phase active" id="phase-compose">

        <div class="compose-card card" id="compose-card">

            <!-- Template Select Banner -->
            <div class="template-preselect-banner" id="template-preselect-banner" style="display: none; align-items: center; justify-content: space-between; padding: 12px 26px; background: rgba(93, 58, 155, 0.08); border-bottom: 1px solid rgba(93, 58, 155, 0.15); color: #5d3a9b; font-weight: 700; font-size: 0.9rem;">
                <span>已套用模板：<span id="preselected-template-name" style="color: var(--accent-gold);"></span></span>
                <button onclick="clearSelectedTemplate()" style="background: none; border: none; color: #ff5e5e; font-weight: 700; cursor: pointer; padding: 4px 8px; font-size: 0.85rem;">取消套用 ✕</button>
            </div>

            <!-- ① Story input area -->
            <div class="compose-input-area" id="compose-input-area">
                <textarea id="story-input" class="compose-textarea" placeholder="告訴我你的想法吧，一句話也沒關係 ✦" rows="3"
                    oninput="onStoryInput()"></textarea>
                <button class="compose-send-btn" id="compose-send" onclick="submitStory()" disabled>
                    <div class="state state--sent">
                        <div class="icon">
                            <svg width="1.5em" height="1.5em" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M14.2199 21.63C13.0399 21.63 11.3699 20.8 10.0499 16.83L9.32988 14.67L7.16988 13.95C3.20988 12.63 2.37988 10.96 2.37988 9.78001C2.37988 8.61001 3.20988 6.93001 7.16988 5.60001L15.6599 2.77001C17.7799 2.06001 19.5499 2.27001 20.6399 3.35001C21.7299 4.43001 21.9399 6.21001 21.2299 8.33001L18.3999 16.82C17.0699 20.8 15.3999 21.63 14.2199 21.63Z"
                                    fill="currentColor"></path>
                            </svg>
                        </div>
                    </div>
                </button>
                <p class="story-advanced-title">進階設定</p>
            </div>

            <!-- ② Options panel -->
            <div class="compose-options" id="compose-options">

                <div class="options-header">
                    <div class="ai-response-line" id="ai-response-line">
                        <span class="ai-response-dot">✦</span>
                        <span class="ai-response-text" id="ai-response-text"></span>
                        <span class="ai-response-cursor" id="ai-response-cursor">|</span>
                    </div>
                    <p class="options-hint" id="options-hint">有需要幫你調整風格嗎？</p>
                    <span class="options-label" id="options-story-label">故事描述</span>
                    <div class="options-story-echo" id="options-echo"></div>
                </div>

                <!-- Style row -->
                <div class="options-section" id="style-section">
                    <p class="options-label">風格 <span class="ai-rec-tag" id="style-rec-tag" style="display:none;">AI 推薦</span></p>
                    <div class="style-chips-row" id="style-chips-row"></div>
                    <button class="style-show-all-btn" id="style-show-all-btn" onclick="showAllStyles()" style="display:none;">查看全部風格 ↓</button>
                </div>

                <!-- Ratio row -->
                <div class="options-section">
                    <p class="options-label">畫面比例</p>
                    <div class="ratio-chips-row" id="ratio-chips-row">
                        <button class="opt-chip ratio-chip active" data-ratio="橫向16:9" onclick="selectRatioOpt(this)">
                            <span class="ratio-icon ratio-icon-16-9"></span>16:9
                        </button>
                        <button class="opt-chip ratio-chip" data-ratio="直向9:16" onclick="selectRatioOpt(this)">
                            <span class="ratio-icon ratio-icon-9-16"></span>9:16
                        </button>
                        <button class="opt-chip ratio-chip" data-ratio="1:1" onclick="selectRatioOpt(this)">
                            <span class="ratio-icon ratio-icon-1-1"></span>1:1
                        </button>
                        <button class="opt-chip ratio-chip" data-ratio="橫向3:2" onclick="selectRatioOpt(this)">
                            <span class="ratio-icon ratio-icon-3-2"></span>3:2
                        </button>
                        <button class="opt-chip ratio-chip" data-ratio="直向2:3" onclick="selectRatioOpt(this)">
                            <span class="ratio-icon ratio-icon-2-3"></span>2:3
                        </button>
                    </div>
                </div>

                <!-- Generate CTA -->
                <div class="options-cta-row">
                    <button class="btn btn-outline options-back-btn" onclick="resetCompose()">
                        ← 重新輸入
                    </button>
                    <div style="display:flex;gap:10px;align-items:center;">
                        <button class="btn btn-outline options-skip-btn" onclick="startGenerate()">
                            不使用模板繼續 →
                        </button>
                        <button class="btn btn-primary options-gen-btn" onclick="proceedToTemplate()">
                            ✦ 選擇模板
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Suggestion chips -->
        <div class="suggestion-row" id="suggestion-row">
            <button class="sugg-chip" onclick="fillSugg(this)">蘋果牛奶廣告</button>
            <button class="sugg-chip" onclick="fillSugg(this)">旅遊短影音</button>
            <button class="sugg-chip" onclick="fillSugg(this)">運動服品牌</button>
            <button class="sugg-chip" onclick="fillSugg(this)">美食餐廳介紹</button>
            <button class="sugg-chip" onclick="fillSugg(this)">科技產品發表</button>
        </div>
    </div>

    <!-- ══════════════════════════════════
       PHASE 1.5 — TEMPLATE SELECT
    ══════════════════════════════════ -->
    <div class="phase" id="phase-template">
        <div class="template-phase-wrap">
            <div class="template-phase-header">
                <div>
                    <h2 class="template-phase-title">選擇模板 <span>✦</span></h2>
                    <p class="template-phase-sub">AI 已根據你的故事推薦最匹配的模板</p>
                </div>
                <button class="btn btn-outline btn-sm" onclick="backToCompose()">← 返回</button>
            </div>

            <!-- AI recommendation banner -->
            <div class="ai-recommend-banner" id="ai-recommend-banner">
                <div class="ai-rec-icon">✦</div>
                <div>
                    <p class="ai-rec-title">AI 推薦</p>
                    <p class="ai-rec-desc" id="ai-rec-desc">正在分析你的故事…</p>
                </div>
                <div class="ai-rec-loading" id="ai-rec-loading">
                    <div class="mini-spinner"></div>
                </div>
            </div>

            <!-- Template Layout matching template.html -->
            <div class="template-layout">
                <aside class="template-cats" id="generate-template-cats">
                    <div class="template-cat-header">
                        <h2>模板分類</h2>
                        <p>選擇最符合故事結構的爆點模式。</p>
                    </div>
                </aside>

                <section class="template-list">
                    <div class="template-grid" id="template-grid"></div>
                </section>
            </div>

            <!-- Template apply footer -->
            <div class="template-apply-footer" id="template-apply-footer">
                <span class="taf-hint" id="taf-hint">請選擇一個模板</span>
                <button class="btn btn-primary" id="taf-apply-btn" onclick="applyTemplateAndGenerate()" disabled>
                    ✦ 套用並生成
                </button>
            </div>

            <!-- Template preview drawer -->
            <div class="template-preview-drawer" id="template-preview-drawer">
                <div class="preview-drawer-inner">
                    <div class="preview-drawer-header">
                        <h3 class="preview-drawer-title" id="preview-title">模板名稱</h3>
                        <button class="preview-drawer-close" onclick="closePreview()">✕</button>
                    </div>
                    <div class="preview-drawer-body" id="preview-body"></div>
                    <div class="preview-drawer-footer">
                        <button class="btn btn-outline btn-sm" onclick="closePreview()">取消</button>
                        <button class="btn btn-primary" id="preview-apply-btn" onclick="applyTemplateAndGenerate()">
                            ✦ 套用並生成
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════
       PHASE 1.6 — VARIABLE CUSTOMIZATION
    ══════════════════════════════════ -->
    <div class="phase" id="phase-variables">
        <div class="template-phase-wrap" style="max-width: 720px; width: 100%;">
            <div class="template-phase-header" style="margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 class="template-phase-title" style="margin: 0; font-size: 1.6rem; font-weight: 800;">設定模板變數 <span style="color: var(--primary);">✦</span></h2>
                    <p class="template-phase-sub" style="margin: 4px 0 0; color: var(--text-mid); font-size: 0.9rem;">自訂義模板中的可替換詞彙，讓分鏡更符合你的品牌與故事</p>
                </div>
                <button class="btn btn-outline btn-sm" onclick="backToTemplateOrCompose()">← 返回</button>
            </div>

            <!-- Loader for AI variable extraction -->
            <div class="variables-loading-container" id="variables-loading-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 40px; background: rgba(255,255,255,0.7); border: 2px solid var(--white); border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); backdrop-filter: blur(10px); gap: 24px;">
                <div class="math-loader-wrapper" style="width: 140px; height: 140px; color: var(--primary);">
                    <svg class="loader math-loader-svg" viewBox="0 0 100 100" fill="none" aria-hidden="true" style="width: 100%; height: 100%; display: block;">
                        <g class="math-loader-group">
                            <path class="math-loader-path" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" opacity="0.1"></path>
                        </g>
                        <g class="math-loader-sucked"></g>
                    </svg>
                </div>
                <p style="font-weight: 700; color: var(--text-mid); margin: 0;">AI 正在分析故事並提取模板變數...</p>
            </div>

            <!-- Variables form -->
            <div class="variables-form-container" id="variables-form-container" style="display: none; background: rgba(255,255,255,0.85); border: 4px solid var(--white); border-radius: 28px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); backdrop-filter: blur(12px); overflow: hidden;">
                <div style="padding: 24px 26px 8px; border-bottom: 2px solid var(--card-border);">
                    <div style="font-size: 0.95rem; font-weight: 800; color: var(--text-dark); margin-bottom: 4px;">模板內的可變元素</div>
                    <div style="font-size: 0.8rem; color: var(--text-light); font-weight: 500;">AI 已為你自動提取以下欄位，你可以自由修改或微調</div>
                </div>
                <form id="variables-form" onsubmit="event.preventDefault();" style="padding: 24px 26px; display: flex; flex-direction: column; gap: 20px; max-height: 380px; overflow-y: auto;">
                    <!-- Dynamic inputs will be inserted here -->
                </form>
            </div>

            <!-- Variables footer -->
            <div class="template-apply-footer" id="variables-footer" style="display: none; margin-top: 20px; align-items: center; justify-content: space-between;">
                <span class="taf-hint" id="variables-hint" style="color: var(--text-mid); font-size: 0.9rem;">確認變數後即可開始生成分鏡</span>
                <button class="btn btn-primary" onclick="confirmVariablesAndGenerate()">
                    ✦ 開始生成分鏡
                </button>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════
       PHASE 2 — GENERATING
    ══════════════════════════════════ -->
    <div class="phase" id="phase-generating">
        <div class="generating-wrap">
            <div class="gen-preview-card" id="gen-preview-card">
                <svg class="loader math-loader-svg" viewBox="0 0 100 100" fill="none" aria-hidden="true">
                    <g class="math-loader-group">
                        <path class="math-loader-path" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            opacity="0.1"></path>
                    </g>
                    <g class="math-loader-sucked"></g>
                </svg>
            </div>
            <div class="gen-text-area">
                <h2 class="gen-loading-title" id="loading-title">正在規劃腳本結構…</h2>
                <p class="gen-loading-sub" id="loading-sub">分析故事語意，拆解場景節奏</p>
                <div class="gen-progress-track">
                    <div class="gen-progress-fill" id="gen-progress"></div>
                </div>
                <span class="gen-progress-pct" id="gen-progress-text">0%</span>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════
       PHASE 3 — RESULT
    ══════════════════════════════════ -->
    <div class="phase" id="phase-result">
        <div class="result-topbar">
            <div class="result-info">
                <h2 class="result-title">分鏡草稿 ✦</h2>
                <p class="result-meta" id="result-meta">—</p>
            </div>
            <div class="result-actions">
                <button class="btn btn-outline btn-sm" onclick="exportStoryboardJson()">↓ 匯出 JSON</button>
                <button class="btn btn-primary btn-sm" onclick="resetAll()">+ 新建分鏡</button>
            </div>
        </div>
        <!-- Template badge (only shown when template used) -->
        <div class="result-template-badge" id="result-template-badge" style="display:none;">
            <span class="badge-label">模板</span>
            <span class="badge-name" id="badge-template-name">—</span>
            <span class="badge-sep">·</span>
            <span class="badge-vars" id="badge-vars">—</span>
        </div>
        <div id="storyboard-grid" style="width:100%;"></div>
    </div>

    <div class="bg-frame" id="bg-top">
        <div class="rail" id="rail-top"></div>
    </div>
    <div class="bg-frame" id="bg-bottom">
        <div class="rail" id="rail-bottom"></div>

    </div>

     <!-- ══════════════════════════════════
         SCRIPTS
     ══════════════════════════════════ -->
     <script src="../js/math-curve-loader.js"></script>
     <script src="../js/token-manager.js"></script>
     <script src="../js/prompt-translate.js"></script>
     <script src="../js/generate.js"></script>
     <script src="../js/sys.js"></script>

</body>

</html>
