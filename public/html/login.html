<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登入 / 註冊 — Storyboard AI</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/auth.css" />
</head>

<body>

    <div class="gradient-bg">
        <div class="gradient-blob-yellow"></div>
    </div>

    <!-- Brand -->
    <a href="../html/index.html" class="auth-brand brand-logo">STORYBOARD <span>AI</span></a>

    <div class="auth-container">

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">登入</button>
            <button class="auth-tab" id="tab-register" onclick="switchTab('register')">免費註冊</button>
        </div>

        <!-- Login Form -->
        <div class="auth-panel card anim-fadeInUp" id="panel-login">
            <div class="auth-strip">
                <div class="strip-hole"></div>
                <div class="strip-hole"></div>
                <div class="strip-hole"></div>
                <div class="strip-title"># LOGIN</div>
            </div>
            <div class="auth-content">
                <div class="auth-header">
                    <h2>歡迎回來！</h2>
                    <p>登入以開始/繼續創作您的短影音</p>
                </div>
    
                <!-- <div class="divider"><span>輸入您的電子信箱和密碼</span></div> -->
    
                <div class="form-group">
                    <label class="form-label">電子信箱</label>
                    <input type="email" class="input-field input-field-rect" placeholder="your@email.com"
                        id="login-email" />
                </div>
                <div class="form-group">
                    <label class="form-label">
                        密碼
                        <a class="form-forgot">忘記密碼？</a>
                    </label>
                    <div class="input-with-icon">
                        <input type="password" class="input-field input-field-rect" placeholder="••••••••"
                            id="login-password" />
                        <button class="input-icon-btn" onclick="togglePwd('login-password', this)">👁</button>
                    </div>
                </div>
    
                <button class="btn btn-primary btn-block" onclick="handleLogin()"
                    style="margin-top:8px; border-radius:var(--radius-sm); padding:14px;">
                    登入
                </button>
    
                <p class="auth-switch">還沒有帳號？<a onclick="switchTab('register')" style="cursor:pointer;">免費註冊</a></p>
            </div>
            <div class="auth-strip bottom">
                <div class="strip-hole"></div>
                <div class="strip-hole"></div>
                <div class="strip-hole"></div>
            </div>
        </div>

        <!-- Register Form -->
        <div class="auth-panel card" id="panel-register" style="display:none;">
            <div class="auth-header">
                <h2>建立帳號</h2>
                <p>免費開始使用 Storyboard AI</p>
            </div>

            <div class="divider"><span>或使用電子信箱</span></div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="input-field input-field-rect" placeholder="你的名字" />
                </div>
                <div class="form-group">
                    <label class="form-label">用戶名稱</label>
                    <input type="text" class="input-field input-field-rect" placeholder="@username" />
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">電子信箱</label>
                <input type="email" class="input-field input-field-rect" placeholder="your@email.com" />
            </div>
            <div class="form-group">
                <label class="form-label">密碼</label>
                <div class="input-with-icon">
                    <input type="password" class="input-field input-field-rect" placeholder="至少 8 個字元"
                        id="reg-password" />
                    <button class="input-icon-btn" onclick="togglePwd('reg-password', this)">👁</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">我的身分</label>
                <div class="role-chips">
                    <label class="role-chip"><input type="radio" name="role" value="student" /><span>🎓
                            學生</span></label>
                    <label class="role-chip"><input type="radio" name="role" value="creator" checked /><span>🎬
                            創作者</span></label>
                    <label class="role-chip"><input type="radio" name="role" value="studio" /><span>🏢
                            工作室</span></label>
                </div>
            </div>

            <button class="btn btn-primary btn-block" onclick="handleRegister()"
                style="margin-top:8px; border-radius:var(--radius-sm); padding:14px;">
                建立帳號 →
            </button>
            <p class="terms-note">點擊即代表你同意我們的<a href="#">服務條款</a>與<a href="#">隱私政策</a></p>
            <p class="auth-switch">已有帳號？<a onclick="switchTab('login')" style="cursor:pointer;">登入</a></p>
        </div>

    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/sys.js"></script>
</body>

</html>
