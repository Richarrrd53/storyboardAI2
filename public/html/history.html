
<!DOCTYPE html>
<html lang="zh-TW">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>歷史專案 — Storyboard AI</title>
	<link rel="stylesheet" href="../css/style.css" />
	<link rel="stylesheet" href="../css/dashboard.css" />
</head>

<body>
	<div id="BG">
		<div class="bgDots" id="bgDot1"
			style="width:600px;height:600px;left:-100px;top:-100px;filter:blur(120px);opacity:0.35;"></div>
		<div class="bgDots" id="bgDot2"
			style="width:500px;height:500px;right:-80px;top:60px;filter:blur(120px);opacity:0.28;"></div>
		<div class="bgDots" id="bgDot4"
			style="width:400px;height:400px;left:30%;bottom:-60px;filter:blur(100px);opacity:0.22;"></div>
		<div id="bgMask"></div>
	</div>

	<main class="dash-main history-main">
		<section class="projects-management anim-fadeInUp">
			<div class="projects-header">
				<h1 class="projects-title">歷史專案</h1>
				<a class="new-project-btn" onclick="spaNavigate('generate')">
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
						<line x1="12" y1="5" x2="12" y2="19"></line>
						<line x1="5" y1="12" x2="19" y2="12"></line>
					</svg>
					新增專案
				</a>
			</div>
			<div class="projects-grid" id="projects-grid">
				<div class="projects-empty">
					<h3>載入中...</h3>
				</div>
			</div>
		</section>
	</main>

	<div class="bg-frame" id="bg-top">
		<div class="rail" id="rail-top"></div>
	</div>
	<div class="bg-frame" id="bg-bottom">
		<div class="rail" id="rail-bottom"></div>
	</div>

	<script src="../js/generate-prefill-path.js"></script>
	<script src="../js/sys.js"></script>
</body>

</html>
