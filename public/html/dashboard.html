<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Storyboard AI</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>

<body>

    <div class="gradient-bg" style="opacity:0.5;">
        <div class="gradient-blob-yellow"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar card">
        <a href="../index.html" class="brand-logo sidebar-brand">STORY<br /><span>BOARD AI</span></a>

        <nav class="sidebar-nav">
            <a href="./dashboard.html" class="sidebar-link active">
                <span class="sidebar-icon">⊞</span> Dashboard
            </a>
            <a href="./generate.html" class="sidebar-link">
                <span class="sidebar-icon">✦</span> 生成分鏡
            </a>
            <a href="#" class="sidebar-link">
                <span class="sidebar-icon">◫</span> 我的專案
            </a>
            <a href="#" class="sidebar-link">
                <span class="sidebar-icon">⊙</span> 爆點模板庫
            </a>
            <a href="./analyze.html" class="sidebar-link">
                <span class="sidebar-icon">↗</span> 影片分析
            </a>
        </nav>



        <div class="sidebar-footer">
            <!-- Token 儀表板組件 -->
            <div class="token-widget card"
                style="padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-radius: 50px;">
                <div style="font-size: 0.8rem; font-weight: 700;">
                    <span style="color: var(--purple);">已用:</span> <span id="token-count">0</span>
                </div>
                <div class="progress-bg"
                    style="width: 80px; height: 6px; background: #eee; border-radius: 10px; overflow: hidden;">
                    <div id="token-bar-fill"
                        style="width: 0%; height: 100%; background: var(--purple); transition: 0.3s;"></div>
                </div>
                <div style="font-size: 0.8rem; font-weight: 700; color: #888;">
                    剩餘: <span id="token-remain">1,000,000</span>
                </div>
            </div>
            <div class="plan-badge-sidebar">
                <span>🎓 初階方案</span>
                <a href="#">升級</a>
            </div>
            <div class="sidebar-user">
                <div class="avatar">黃</div>
                <div class="user-info">
                    <p class="user-name">黃晟銘</p>
                    <p class="user-email">aaaa@bbbb.edu.tw</p>
                </div>
                <a href="../html/login.html" class="logout-btn">↩</a>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <section class="hero-search-section anim-fadeInUp">
            <h1 class="hero-title">Start From New Idea...</h1>

            <div class="search-container card">
                <textarea class="search-input" placeholder="請輸入您的劇本想法，或貼上完整段落..."></textarea>

                <div class="search-toolbar">
                    <div class="toolbar-left">
                        <button class="tool-btn"><span class="icon">📷</span> 開啟 3D 動作捕捉</button>
                        <button class="tool-btn"><span class="icon">🎤</span> 語音輸入</button>
                        <button class="tool-btn"><span class="icon">📎</span> 上傳檔案</button>
                        <button class="tool-btn plus-btn">+</button>
                    </div>

                    <div class="toolbar-right">
                        <div class="select-wrapper">
                            <span class="icon">◫</span>
                            <select>
                                <option>16:9</option>
                                <option>9:16</option>
                                <option>1:1</option>
                            </select>
                        </div>
                        <div class="select-wrapper">
                            <span class="icon">✨</span>
                            <select>
                                <option>預設</option>
                                <option>日系動漫</option>
                                <option>電影寫實</option>
                            </select>
                        </div>
                        <button class="generate-circle-btn" onclick="window.location.href='./generate.html'">
                            ✦
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="recent-section anim-fadeInUp anim-delay-1">
            <div class="section-row-header">
                <h2>近期專案</h2>
                <a href="#" class="view-all">View more ></a>
            </div>
            <div class="projects-grid">
                <div class="project-card card" onclick="window.location.href='generate.html'">
                    <div class="project-thumb" style="background:linear-gradient(135deg,#1a1a2e,#2d2d4e)">🎬</div>
                    <div class="project-info">
                        <h3>蘋果牛奶廣告</h3>
                        <p class="project-date">2026年4月11日</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="templates-section anim-fadeInUp anim-delay-2">
            <div class="section-row-header">
                <div class="title-with-icon">
                    <span class="rocket-icon">🚀</span>
                    <h2>熱門爆點模板庫</h2>
                </div>
                <a href="./templates.html" class="view-all">View more ></a>
            </div>

            <div class="templates-grid">
                <div class="template-item card">
                    <div class="template-preview">
                        <div class="tag-group">
                            <span class="mini-tag">Business</span>
                            <span class="mini-tag">Creator Tips</span>
                        </div>
                        <div class="preview-placeholder">🖼️</div>
                    </div>
                    <div class="template-detail">
                        <h3>模板1...</h3>
                        <p>By Alice</p>
                        <div class="template-stats">
                            <span>👁️ 3.2M</span>
                            <span>♡ 240K</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/dashboard.js"></script>
    <script src="../js/sys.js"></script>
</body>

</html>
