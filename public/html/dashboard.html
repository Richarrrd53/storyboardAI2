<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Storyboard AI</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>

<body>

    <!-- Dynamic BG -->
    <div id="BG">

    </div>

    <!-- ═══ TOPBAR ═══ -->
    <header class="sidebar" id="dash-sidebar">
        <div class="side-header">
            <a class="side-logo brand-logo" id="side-logo">
                <span>LOGO</span>
                <div class="logo-text">Storyboard<span>AI</span></div>
                <label class="side-burger" id="burger-container" for="burger">
                    <input type="checkbox" id="burger">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </a>
        </div>

        <nav class="side-body">

            <a href="../generate" class="side-link highlight" id="nav-generate" title="新建分鏡">
                <img src="../icon/plus-blur.svg" alt="" style="z-index: 2; opacity: 1;">
                <span>新建分鏡</span>
                <div class="link-glow"></div>
            </a>

            <hr>
            
            <a href="../dashboard" class="side-link" id="nav-home" title="首頁">
                <img src="../icon/home-blur.svg" alt="" style="z-index: 2; opacity: 1;">
                <span>首頁</span>
                <div class="link-glow"></div>
            </a>
            <div class="side-nav-group" id="nav-projects-group">
                <div class="side-link-row">
                    <a href="../projects" class="side-link" id="nav-projects" title="分鏡">
                        <img src="../icon/folder-blur.svg" alt="" style="z-index: 2; opacity: 1;">
                        <span>分鏡</span>
                        <div class="link-glow"></div>
                    </a>
                    <button class="sub-list-toggle" id="projects-toggle-btn" title="展開/收疊分鏡" type="button">
                        <svg class="toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <line x1="12" y1="5" x2="12" y2="19" class="toggle-vertical-line"></line>
                        </svg>
                    </button>
                </div>
                <div class="side-sub-list" id="sidebar-projects-list">
                </div>
            </div>
            <a href="../history" class="side-link" id="nav-history" title="資源回收桶">
                <img src="../icon/trash-blur.svg" alt="" style="z-index: 2; opacity: 1;">
                <span>資源回收桶</span>
                <div class="link-glow"></div>
            </a>
            <a href="../template" class="side-link" id="nav-template" title="爆點模板庫">
                <img src="../icon/search-blur.svg" alt="" style="z-index: 2; opacity: 1;">
                <span>爆點模板庫</span>
                <div class="link-glow"></div>
            </a>
        </nav>

        <div class="side-footer">
            <div class="top-avatar" id="top-avatar">黃</div>
        </div>
    </header>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main id="page-main" class="dash-main home-main">
        <!-- Welcome Section -->
        <section class="home-welcome anim-fadeInUp">
            <h1 class="welcome-title">歡迎回來，<span id="home-user-name">創作者</span> ✦</h1>
            <p class="welcome-subtitle">今天想創作什麼樣的分鏡故事呢？</p>
        </section>

        <!-- Welcome & Quickstart Section -->
        <section class="home-hero-section anim-fadeInUp anim-delay-1">
            <div class="home-hero-grid">
                <!-- Left Banner Card: Create Storyboard -->
                <div class="hero-banner-card" onclick="spaNavigate('generate')">
                    <div class="hero-banner-content">
                        <span class="hero-banner-badge">AI 創作助理</span>
                        <h2 class="hero-banner-title">靈感，一鍵轉換</h2>
                        <p class="hero-banner-desc">輸入故事，一鍵智慧分析分鏡、編排鏡頭並生成精美畫面與鏡頭動態描述。</p>
                        <button class="hero-banner-btn">
                            <span>立刻新建分鏡</span>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </button>
                    </div>
                    <div class="hero-banner-media">
                        <img src="../images/home_hero_banner.png" alt="Creative Illustration" class="hero-media-img">
                    </div>
                </div>

                <!-- Right Quickstart Grid -->
                <div class="hero-quick-grid">
                    <!-- Template Card -->
                    <div class="quick-widget-card template-widget" onclick="spaNavigate('template')">
                        <div class="widget-icon">
                            <img src="../icon/search-focus.svg" alt="Templates">
                        </div>
                        <div class="widget-content">
                            <h3>爆點模板庫</h3>
                            <p>套用最熱門的短影音腳本</p>
                        </div>
                        <div class="widget-arrow">→</div>
                    </div>
                    
                    <!-- Recycle Bin Card -->
                    <div class="quick-widget-card recycle-widget" onclick="spaNavigate('history')">
                        <div class="widget-icon">
                            <img src="../icon/trash-focus.svg" alt="Recycle Bin">
                        </div>
                        <div class="widget-content">
                            <h3>資源回收桶</h3>
                            <p>復原或清理軟刪除分鏡</p>
                        </div>
                        <div class="widget-arrow">→</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Recent Projects Section -->
        <section class="projects-management anim-fadeInUp anim-delay-2" style="margin-top: 56px;">
            <div class="projects-header">
                <h2 class="projects-title" style="font-size: 1.5rem;">最近編輯分鏡</h2>
                <a onclick="spaNavigate('projects')" style="cursor: pointer; display: flex; align-items: center; gap: 5px; color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.95rem;">
                    查看所有分鏡
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </a>
            </div>
            
            <div class="projects-grid" id="recent-projects-grid">
                <!-- Recent projects will be dynamically rendered here -->
                <div class="projects-empty">
                    <h3>載入中...</h3>
                </div>
            </div>
        </section>
    </main>



    <!-- User Tooltip Panel -->
    <div class="user-panel" id="user-panel">
        <div class="up-header">
            <div class="up-avatar">黃</div>
            <div>
                <p class="up-name">黃晟銘</p>
                <p class="up-email">aaaa@bbbb.edu.tw</p>
            </div>
            <div class="up-plan">Free</div>
        </div>
        <div class="up-divide"></div>
        <div class="up-body">
            <a  class="up-btn"><img src="../icon/profile.svg" alt=""><span>個人檔案</span></a>
            <a  class="up-btn"><img src="../icon/upgrade.svg" alt=""><span>升級方案</span></a>
            <a  class="up-btn"><img src="../icon/setting.svg" alt=""><span>設定</span></a>
        </div>
        <div class="up-divide"></div>
        <a href="../html/login.html" class="up-btn up-logout"><img src="../icon/logout.svg" alt=""><span>登出</span></a>
    </div>

    <script src="../js/generate-prefill-path.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/sys.js"></script>
    <script>
        function launchGenerate() {
            const story = document.getElementById('dash-story').value.trim();
            const ratio = document.getElementById('dash-ratio').value;
            const styleIdx = document.getElementById('dash-style').value;

            if (!story) {
                document.getElementById('dash-story').focus();
                document.querySelector('.idea-box').classList.add('shake');
                setTimeout(() => document.querySelector('.idea-box').classList.remove('shake'), 600);
                return;
            }

            sessionStorage.setItem('sb_story', story);
            sessionStorage.setItem('sb_ratio', ratio);
            sessionStorage.setItem('sb_styleIdx', styleIdx);
            sessionStorage.setItem('sb_skipToStep', '3');

            window.location.href = './generate.html';
        }

        document.getElementById('dash-story').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                launchGenerate();
            }
        });

        document.getElementById('top-avatar').addEventListener('click', function (e) {
            e.stopPropagation();
            const panel = document.getElementById('user-panel');
            panel.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            document.getElementById('user-panel').classList.remove('active');
        });
    </script>
</body>

</html>
