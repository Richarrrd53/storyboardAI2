    <!-- ═══ MAIN CONTENT ═══ -->

        <!-- Hero Input Section -->

            </div>
            
            <div class="projects-grid" id="projects-grid">
                <!-- Projects will be dynamically rendered here -->
            </div>
        </section>
</div>

    </main>

    <div class="bg-frame" id="bg-top">
        <div class="rail" id="rail-top"></div>
    </div>
    <div class="bg-frame" id="bg-bottom">
        <div class="rail" id="rail-bottom"></div>

    </div>


    <!-- User Tooltip Panel -->
    <div class="user-panel" id="user-panel">
        <div class="up-avatar">黃</div>
        <div>
            <p class="up-name">黃晟銘</p>
            <p class="up-email">aaaa@bbbb.edu.tw</p>
        </div>
        <div class="up-right">
            <span class="up-plan">🎓 初階</span>
            <a href="../html/login.html" class="up-logout">↩</a>
        </div>
    </div>

    <script src="../js/generate-prefill-path.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/sys.js"></script>
    <script>
        function launchGenerate() {
            const story = document.getElementById('dash-story').value.trim();
            const ratio = document.getElementById('dash-ratio').value;
            const styleIdx = document.getElementById('dash-style').value;

            if (!story) {
                document.getElementById('dash-story').focus();
                document.querySelector('.idea-box').classList.add('shake');
                setTimeout(() => document.querySelector('.idea-box').classList.remove('shake'), 600);
                return;
            }

            sessionStorage.setItem('sb_story', story);
            sessionStorage.setItem('sb_ratio', ratio);
            sessionStorage.setItem('sb_styleIdx', styleIdx);
            sessionStorage.setItem('sb_skipToStep', '3');

            window.location.href = './generate.html';
        }

        document.getElementById('dash-story').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                launchGenerate();
            }
        });

        document.getElementById('top-avatar').addEventListener('click', function (e) {
            e.stopPropagation();
            const panel = document.getElementById('user-panel');
            panel.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            document.getElementById('user-panel').classList.remove('active');
        });
    </script>
</body>

</html>
