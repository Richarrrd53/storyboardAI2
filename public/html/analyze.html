<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <title>影片分析 — Storyboard AI</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/generate.css" /> <!-- 複用部分樣式 -->
</head>

<body>
    <nav class="gen-nav">
        <a href="./dashboard.html" class="brand-logo gen-brand">STORYBOARD <span>AI</span></a>
        <!-- 同樣加入 Token Widget -->
        <div class="token-widget card"
            style="padding: 5px 15px; display: flex; align-items: center; gap: 12px; border-radius: 50px;">
            <span style="font-size: 0.75rem;">Token: <span id="token-count">0</span></span>
            <div id="token-bar-fill" style="width: 30px; height: 4px; background: var(--purple);"></div>
        </div>
    </nav>

    <main style="max-width: 800px; margin: 120px auto; padding: 0 20px;">
        <div class="card" style="padding: 40px; text-align: center;">
            <h1 style="margin-bottom: 10px;">📈 影片爆點分析</h1>
            <p style="color: var(--text-light); margin-bottom: 30px;">上傳熱門短影音，AI 自動拆解 Hook 與鏡頭語言</p>

            <div style="border: 2px dashed #ddd; padding: 40px; border-radius: 20px; margin-bottom: 20px;">
                <input type="file" id="video-file" accept="video/*" style="margin-bottom: 20px;"><br>
                <small>建議 15 秒以內短片 (MP4, MOV)</small>
            </div>

            <button id="analyze-btn" class="btn btn-primary btn-lg" onclick="startAnalysis()">🚀 開始 AI 審片</button>
        </div>

        <!-- 分析結果區 -->
        <div id="analysis-result" class="card"
            style="display: none; margin-top: 30px; padding: 30px; line-height: 1.8;">
            <h3 style="color: var(--purple); margin-bottom: 15px;">🔍 AI 分析報告</h3>
            <div id="analysis-text" style="text-align: left;"></div>
        </div>
    </main>

    <script src="../js/token-manager.js"></script>
    <script>
        async function startAnalysis() {
            const fileInput = document.getElementById('video-file');
            const btn = document.getElementById('analyze-btn');
            const resultArea = document.getElementById('analysis-result');
            const textArea = document.getElementById('analysis-text');

            if (!fileInput.files[0]) return alert("請先選擇影片檔案");

            // 取得檔案大小 (Byte)
            const fileSizeMB = fileInput.files[0].size / (1024 * 1024);

            btn.innerText = "🧠 AI 引擎分析中...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('video', fileInput.files[0]);

            try {
                const res = await fetch('/api/analyze-video', {
                    method: 'POST',
                    body: formData
                });

                // --- 關鍵：檢查 HTTP 狀態碼 ---
                if (res.status === 413) {
                    // 這裡就是攔截 Vercel 4.5MB 限制的地方
                    alert(`檔案過大 (約 ${fileSizeMB.toFixed(2)}MB)\n\n由於 Vercel 平台的限制，檔案不能超過 4.5MB。\n建議使用本地端開啟。`);
                    return; // 結束執行
                }

                if (!res.ok) {
                    const errorInfo = await res.json();
                    throw new Error(errorInfo.details || "伺服器發生錯誤");
                }

                const data = await res.json();

                if (data.analysis) {
                    resultArea.style.display = 'block';
                    // 因為後端已經套用了 marked，所以直接放進去即可，不需要再 replace \n
                    textArea.innerHTML = data.analysis;

                    // 平滑捲動到結果區
                    resultArea.scrollIntoView({ behavior: 'smooth' });

                    if (data.usage) updateTokenUsage(data.usage.totalTokens);
                }
            } catch (e) {
                console.error(e);
                alert("分析失敗：" + e.message);
            } finally {
                btn.innerText = "🚀 開始 AI 審片";
                btn.disabled = false;
            }
        }
    </script>
    <script src="../js/sys.js"></script>
</body>

</html>
