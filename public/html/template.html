<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爆點模板庫 — Storyboard AI</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>

<body>
  <main class="dash-main template-main">
    <section class="projects-management anim-fadeInUp">
      <div class="projects-header">
        <h1 class="projects-title">爆點模板庫</h1>
        <a class="new-project-btn" onclick="navigate('generate')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          新增專案
        </a>
      </div>

      <div class="template-layout">
        <aside class="template-cats" id="template-cats">
          <!-- categories rendered here -->
        </aside>

        <section class="template-list">
          <div class="template-grid" id="template-grid">
            <!-- templates rendered here -->
          </div>
          <div class="template-detail" id="template-detail">
            <!-- detail shown when clicking a template -->
          </div>
        </section>
      </div>

    </section>
  </main>

  <div class="bg-frame" id="bg-top">
    <div class="rail" id="rail-top"></div>
  </div>
  <div class="bg-frame" id="bg-bottom">
    <div class="rail" id="rail-bottom"></div>
  </div>

  <script src="../js/generate-prefill-path.js"></script>
  <script src="../js/sys.js"></script>
</body>

</html>
